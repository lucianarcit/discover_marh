<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             style-src 'self' 'unsafe-inline';
             img-src 'self' data:;
             connect-src 'self' http://localhost:8000;
             font-src 'self';
             object-src 'none';
             base-uri 'self';">
  <meta name="description" content="ChatAlelo — Assistente de RH com IA. POC MARH Agent.">
  <title>ChatAlelo — Espaço RH</title>

  <link rel="stylesheet" href="assets/css/common.css">
  <link rel="stylesheet" href="assets/css/chat.css">
  <link rel="stylesheet" href="assets/css/agent-response.css">
</head>

<body class="chat-body">

  <!-- ── Header ── -->
  <header class="chat-header" role="banner">
    <a href="index.html"
       class="chat-header__back"
       aria-label="Voltar para o Espaço RH">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
           aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>

    <div class="chat-header__title">ChatAlelo</div>

    <!-- Indicador de ambiente -->
    <div id="env-badge"
         class="env-badge env-badge--mock"
         role="status"
         aria-label="Modo de execução">
      <span class="env-badge__dot" aria-hidden="true"></span>
      <span class="env-badge__label">MOCK LOCAL</span>
    </div>
  </header>

  <!-- ── Área principal ── -->
  <main id="main-content" role="main" class="chat-main">

    <!-- Região de mensagens -->
    <div id="chat-messages"
         class="chat-messages"
         role="list"
         aria-label="Histórico da conversa"
         aria-live="off">

      <!-- ── Estado inicial: boas-vindas ── -->
      <section id="chat-welcome"
               class="chat-welcome"
               aria-label="Início da conversa">

        <div class="chat-welcome__heading">
          <p class="chat-welcome__greeting">Olá!</p>
          <h1 class="chat-welcome__question">Por onde começamos?</h1>
        </div>

        <!-- Sugestões como linhas de largura total — igual à referência -->
        <div class="suggestions-list" role="list" aria-label="Sugestões de perguntas">

          <button class="suggestion-row"
                  type="button"
                  role="listitem"
                  data-suggestion="O que posso fazer?"
                  aria-label="Descubra como posso te ajudar">
            <span class="suggestion-row__icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                   stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </span>
            <span class="suggestion-row__text">Descubra como posso te ajudar</span>
          </button>

          <button class="suggestion-row"
                  type="button"
                  role="listitem"
                  data-suggestion="Consultar pedido 342671"
                  aria-label="Consultar pedido">
            <span class="suggestion-row__icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                   stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
              </svg>
            </span>
            <span class="suggestion-row__text">Consultar pedido</span>
          </button>

          <button class="suggestion-row"
                  type="button"
                  role="listitem"
                  data-suggestion="Como cadastrar colaboradores?"
                  aria-label="Como cadastrar colaboradores">
            <span class="suggestion-row__icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                   stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
              </svg>
            </span>
            <span class="suggestion-row__text">Adicionar novos colaboradores</span>
          </button>

          <button class="suggestion-row"
                  type="button"
                  role="listitem"
                  data-suggestion="Pedidos com status pago"
                  aria-label="Consultar pedidos por status">
            <span class="suggestion-row__icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                   stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
              </svg>
            </span>
            <span class="suggestion-row__text">Solicitar 2ª via do cartão</span>
          </button>

        </div>
      </section>

    </div><!-- /chat-messages -->

    <!-- Região aria-live para leitores de tela -->
    <div id="chat-live-region"
         aria-live="polite"
         aria-atomic="true"
         role="status">
    </div>

  </main>

  <!-- ── Área de input — sempre fixada no rodapé ── -->
  <footer class="chat-input-area" role="contentinfo">
    <div class="chat-input-row">

      <!-- Botão de anexo -->
      <button id="btn-attach"
              class="chat-input-attach"
              type="button"
              aria-label="Adicionar anexo"
              aria-haspopup="true"
              aria-expanded="false"
              aria-controls="attach-menu">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
      </button>

      <!-- Campo de texto -->
      <div class="chat-input-wrap">
        <textarea id="chat-input"
                  class="chat-input-field"
                  placeholder="Escreva sua mensagem..."
                  rows="1"
                  maxlength="2000"
                  aria-label="Campo de mensagem"
                  aria-multiline="true"
                  autocomplete="off"
                  autocorrect="on"
                  spellcheck="true"></textarea>
      </div>

      <!-- Botão de envio -->
      <button id="btn-send"
              class="chat-input-send"
              type="button"
              disabled
              aria-label="Enviar mensagem">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>

    </div>
  </footer>

  <!-- ── Menu de anexos (bottom sheet) ── -->
  <div id="attach-menu"
       class="attach-menu"
       role="dialog"
       aria-modal="true"
       aria-label="Adicionar anexo"
       aria-hidden="true">

    <div class="attach-menu__handle" aria-hidden="true"></div>
    <p class="attach-menu__title">Adicionar anexo</p>

    <div class="attach-menu__options" role="list">

      <button class="attach-menu__option attach-menu__option--gallery"
              type="button"
              role="listitem"
              data-attach-option="gallery"
              aria-label="Escolher imagem da galeria">
        <span class="attach-menu__option-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </span>
        <span class="attach-menu__option-info">
          <span class="attach-menu__option-label">Escolher imagem</span>
          <span class="attach-menu__option-hint">Selecione uma foto da galeria</span>
        </span>
      </button>

      <button class="attach-menu__option attach-menu__option--camera"
              type="button"
              role="listitem"
              data-attach-option="camera"
              aria-label="Tirar foto">
        <span class="attach-menu__option-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </span>
        <span class="attach-menu__option-info">
          <span class="attach-menu__option-label">Tirar foto</span>
          <span class="attach-menu__option-hint">Abra a câmera para enviar uma imagem</span>
        </span>
      </button>

      <button class="attach-menu__option attach-menu__option--file"
              type="button"
              role="listitem"
              data-attach-option="file"
              aria-label="Escolher arquivo">
        <span class="attach-menu__option-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </span>
        <span class="attach-menu__option-info">
          <span class="attach-menu__option-label">Escolher arquivo</span>
          <span class="attach-menu__option-hint">Imagem, PDF, TXT, CSV, Excel ou DOC até 7 MB</span>
        </span>
      </button>

    </div>

    <button id="attach-cancel"
            class="attach-menu__cancel"
            type="button"
            aria-label="Cancelar">
      Cancelar
    </button>
  </div>

  <!-- ── Backdrop (fecha menus ao clicar fora) ── -->
  <div id="overlay-backdrop" class="overlay-backdrop" aria-hidden="true"></div>

  <!-- ── Scripts — ordem importa: config → mock → api → renderer → chat ── -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/mock-agent.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/message-renderer.js"></script>
  <script src="assets/js/chat.js"></script>

</body>
</html>
